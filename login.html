<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – POC</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-header">
      <h1>POC</h1>
      <p>Sign in to access the app</p>
    </div>
    <!-- Clerk mounts the sign-in form here -->
    <div id="clerk-sign-in"></div>
  </div>

  <!-- Replace CLERK_PUBLISHABLE_KEY with your key from https://dashboard.clerk.com -->
  <script>
    const CLERK_KEY = 'pk_test_c2VsZWN0LWdvcGhlci04MS5jbGVyay5hY2NvdW50cy5kZXYk';
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js';
    script.onload = async () => {
      const clerk = new window.Clerk(CLERK_KEY);
      await clerk.load();
      if (clerk.user) {
        window.location.replace('index.html');
      } else {
        clerk.mountSignIn(document.getElementById('clerk-sign-in'), {
          afterSignInUrl: new URL('index.html', window.location.href).href,
          afterSignUpUrl: new URL('index.html', window.location.href).href,
        });
      }
    };
    document.head.appendChild(script);
  </script>

</body>
</html>
